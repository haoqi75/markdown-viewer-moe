name: Build to GitHub Releases

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        description: 发布的标签名（如 v1.4.0）
        default: "v1.4.0"
      changes_name:
        description: 发布名称
      changes_description:
        description: 发布内容
        
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Get tag name
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME=${{ github.event.inputs.tag_name }}
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Tag: $TAG_NAME"
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get_tag.outputs.tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11"

      - name: Install Dependencies
        run: pnpm install
        
      - name: Build page for release
        run: pnpm run build:release
        
      - name: Build tools for release
        run: pnpm run build:tools --release
        
      - name: Get tools verison
        id: get_tools_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TOOLS_VERSION=$(cat tools/package.json | jq -r .version)
            echo "tools_version=${TOOLS_VERSION}" >> $GITHUB_OUTPUT
            echo "Tools version: ${TOOLS_VERSION}"
          fi
        
      - name: Generate release body
        id: body
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # 从 tag annotation 或最近的 commit 获取描述
            TAG_MSG=$(git tag -l --format='%(contents)' ${{ steps.get_tag.outputs.tag_name }})
            COMMIT_MSG=$(git log -1 --pretty=%B ${{ steps.get_tag.outputs.tag_name }})
            {
              echo "## 📦 构建信息"
              echo ""
              echo "**Tag:** ${{ steps.get_tag.outputs.tag_name }}"
              echo "**Commit:** $(git rev-parse --short ${{ steps.get_tag.outputs.tag_name }})"
              echo ""
              echo "**Tools version:** ${{ steps.get_tools_version.outputs.tools_version }}"
              echo ""
              if [ -n "$TAG_MSG" ]; then
                echo "## 📝 更新内容"
                echo ""
                echo "$TAG_MSG"
              else
                echo "## 📝 更新内容"
                echo ""
                echo "$COMMIT_MSG"
              fi
              echo ""
              echo "## 📥 下载"
              echo "下载 \`index.release.html\`，用记事本编辑顶部 JSON 即可自定义 defaultUrl 和 aliases。"
              echo "下载 \`tools-vX.X.X.html\` 可以下载config.json编辑工具。"
            } > release_body.md
            echo "✅ Use commit to synthesize the release body."
          else
            echo "${{ github.event.inputs.changes_description }}" > release_body.md
            echo "✅ Use charge_description to configure the release body."
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          name: "${{ steps.get_tag.outputs.tag_name }}${{ github.event.inputs.changes_name && format(' {0}', github.event.inputs.changes_name) || '' }}"
          draft: false
          body_path: release_body.md
          prerelease: false
          files: |
            ./dist/index.release.html
            ./dist/tools-v*.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Output summary
        run: |
          echo "## 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "已构建 index.release.html 并发布到 Releases" >> $GITHUB_STEP_SUMMARY
          echo "✅ Success"