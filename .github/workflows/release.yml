name: Release to GitHub Releases

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag_name:
        required: true
        description: 发布的标签名（如 v1.4.0）
      changes_name:
        description: 发布名称
      changes_description:
        description: 发布内容
        
permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Get tag name
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
          else
            TAG_NAME=${{ github.event.inputs.tag_name }}
          fi
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "Tag: $TAG_NAME"
      
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get_tag.outputs.tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "11"

      - name: Install Dependencies
        run: pnpm install
        
      - name: Build page to release
        run: pnpm run build:release
        
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag_name }}
          name: "${{ steps.get_tag.outputs.tag_name }} ${{ github.event.inputs.changes_name || '' }}"
          draft: false
          body: ${{ github.event.inputs.changes_description || '' }}
          prerelease: false
          files: ./dist/index.release.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Output summary
        run: |
          echo "## 部署完成" >> $GITHUB_STEP_SUMMARY
          echo "已构建 index.release.html 并发布到 Releases" >> $GITHUB_STEP_SUMMARY
          echo "✅ Success"