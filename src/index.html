<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 萌·Markdown 预览器</title>

    <!-- ====== 网站图标 ====== -->
    <link rel="icon" type="image/svg+xml" href="img/favicon.svg">
    <link rel="alternate icon" href="img/favicon.ico" sizes="32x32">
    <link rel="apple-touch-icon" href="img/apple-touch-icon.png" sizes="180x180">
    <link rel="manifest" href="img/site.webmanifest">

    <!-- 外部依赖 -->
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css">
    <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>

    <config-placeholder></config-placeholder>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 浮动装饰 -->
    <div class="moe-deco" aria-hidden="true">🌸</div>
    <div class="moe-deco" aria-hidden="true">⭐</div>
    <div class="moe-deco" aria-hidden="true">💖</div>
    <div class="moe-deco" aria-hidden="true">✨</div>

    <div id="toc-overlay" class="toc-overlay"></div>

    <aside id="toc-sidebar" class="toc-sidebar" role="navigation" aria-label="文档目录">
        <div class="toc-header">
            <h3>📋 大纲 <span id="toc-count">0</span></h3>
            <button class="toc-close" id="toc-close-btn" aria-label="关闭目录">✕</button>
        </div>
        <div id="toc-content">
            <div class="toc-empty">🌸 暂无标题</div>
        </div>
        <div class="toc-footer-deco">
            <img src="sit-down-placeholder" alt="">
        </div>
    </aside>

    <main class="card" role="main">
        <div class="header">
            <div class="header-left">
                <img id="logo-img" src="logo-placeholder" alt="Logo" class="logo-img">
                <span class="logo">📝 萌·Markdown</span>
                <span class="logo-sub">Moe Preview</span>
            </div>
            <button id="toc-toggle" class="toc-toggle" aria-label="切换目录">
                📑 大纲 <span class="badge" id="toc-badge">0</span>
            </button>
            <a href="https://github.com/haoqi75/markdown-viewer-moe" target="_blank" rel="noopener" class="github-link" title="GitHub 仓库" aria-label="GitHub 仓库">
                <svg class="github-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
            </a>
        </div>
        <div id="content">
            <div class="loading-wrap">
                <div class="spinner"></div>
                <p>🌸 正在加载文档...</p>
            </div>
        </div>
        
        <!-- 页脚（放在卡片内部） -->
        <footer id="footer" class="footer"></footer>
    </main>
    
    <!-- 右下角吉祥物（在卡片外，固定定位） -->
    <div id="mascot" class="mascot">
        <img id="mascot-img" src="mascot-placeholder" alt="Mascot">
    </div>

    <script src="script.js"></script>
</body>
</html>
